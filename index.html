<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Shirt Size Collection</title>
    <script src="https://zenithkandel.com.np/fontawesome/zenith-icons.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="form-page">
    <main class="form-container">
        <div class="form-header">
            <div class="form-icon">
                <i class="fa-solid fa-shirt"></i>
            </div>
            <h1>T-Shirt Size Collection</h1>
            <p class="form-subtitle">Fill in your details below</p>
        </div>

        <form id="tshirtForm" class="form-body">
            <div class="input-group">
                <label for="name">
                    <i class="fa-solid fa-user"></i>
                    Full Name
                </label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required autocomplete="name">
            </div>

            <div class="input-group">
                <label for="rollNumber">
                    <i class="fa-solid fa-hashtag"></i>
                    Roll Number
                </label>
                <input type="text" id="rollNumber" name="rollNumber" placeholder="Enter your roll number" required>
            </div>

            <div class="input-group">
                <label for="house">
                    <i class="fa-solid fa-house-chimney"></i>
                    House
                </label>
                <select id="house" name="house" required>
                    <option value="" disabled selected>Select your house</option>
                    <option value="Gaurishankar">Gaurishankar</option>
                    <option value="Byashrishi">Byashrishi</option>
                    <option value="Ratnachuli">Ratnachuli</option>
                    <option value="Choyu">Choyu</option>
                </select>
            </div>

            <div class="input-group">
                <label for="size">
                    <i class="fa-solid fa-ruler"></i>
                    T-Shirt Size
                </label>
                <input type="text" id="size" name="size" placeholder="e.g. S, M, L, XL or 38, 40, 42" required>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <i class="fa-solid fa-paper-plane"></i>
                <span>Submit</span>
            </button>
        </form>

        <div class="form-footer">
            <div class="warning">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <p>Once submitted, this form <strong>cannot be undone</strong>. Please check your details before submitting.</p>
            </div>
        </div>

        <div id="successMessage" class="success-message hidden">
            <div class="success-icon">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <h2>Submitted!</h2>
            <p>Your t-shirt size has been recorded successfully.</p>
            <button onclick="resetForm()" class="submit-btn">
                <i class="fa-solid fa-arrow-rotate-left"></i>
                <span>Submit Another</span>
            </button>
        </div>

        <div id="errorMessage" class="error-message hidden">
            <i class="fa-solid fa-circle-xmark"></i>
            <p id="errorText"></p>
        </div>
    </main>

    <script>
        const form = document.getElementById('tshirtForm');
        const submitBtn = document.getElementById('submitBtn');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.add('hidden');

            const formData = {
                name: document.getElementById('name').value.trim(),
                rollNumber: document.getElementById('rollNumber').value.trim(),
                house: document.getElementById('house').value,
                size: document.getElementById('size').value.trim()
            };

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i><span>Submitting...</span>';

            try {
                const response = await fetch('submit.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (result.success) {
                    form.classList.add('hidden');
                    document.querySelector('.form-footer').classList.add('hidden');
                    successMessage.classList.remove('hidden');
                } else {
                    errorText.textContent = result.message || 'Something went wrong. Please try again.';
                    errorMessage.classList.remove('hidden');
                }
            } catch (err) {
                errorText.textContent = 'Network error. Please check your connection and try again.';
                errorMessage.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i><span>Submit</span>';
            }
        });

        function resetForm() {
            form.reset();
            form.classList.remove('hidden');
            document.querySelector('.form-footer').classList.remove('hidden');
            successMessage.classList.add('hidden');
            errorMessage.classList.add('hidden');
        }
    </script>
</body>
</html>
