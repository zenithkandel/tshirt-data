<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Shirt Size Collection</title>
    <script src="https://zenithkandel.com.np/fontawesome/zenith-icons.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="form-page">
    <div class="form-wrapper">
        <div class="form-header">
            <div class="form-icon">
                <i class="fa-sharp fa-thin fa-shirt"></i>
            </div>
            <h1>T-Shirt Size</h1>
            <p>Fill in your details below</p>
        </div>

        <form id="tshirtForm">
            <div class="form-group">
                <label for="name"><i class="fa-sharp fa-thin fa-user"></i> Name</label>
                <input type="text" id="name" class="form-input" placeholder="Enter your name" required autocomplete="name">
            </div>

            <div class="form-group">
                <label for="rollNumber"><i class="fa-sharp fa-thin fa-hashtag"></i> Roll Number</label>
                <input type="text" id="rollNumber" class="form-input" placeholder="Enter your roll number" required>
            </div>

            <div class="form-group">
                <label for="house"><i class="fa-sharp fa-thin fa-house"></i> House</label>
                <select id="house" class="form-select" required>
                    <option value="" disabled selected>Select your house</option>
                    <option value="Gaurishankar">Gaurishankar</option>
                    <option value="Byashrishi">Byashrishi</option>
                    <option value="Ratnachuli">Ratnachuli</option>
                    <option value="Choyu">Choyu</option>
                </select>
            </div>

            <div class="form-group">
                <label for="size"><i class="fa-sharp fa-thin fa-ruler"></i> T-Shirt Size</label>
                <input type="text" id="size" class="form-input" placeholder="Enter size" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary" id="submitBtn">
                    <i class="fa-sharp fa-thin fa-paper-plane"></i>
                    Submit
                </button>
            </div>

            <p class="form-note">
                <i class="fa-sharp fa-thin fa-circle-info"></i>
                Once submitted, this form cannot be undone.
            </p>
        </form>

        <div id="successPanel" class="success-panel hidden">
            <div class="success-icon">
                <i class="fa-sharp fa-thin fa-check"></i>
            </div>
            <h2>Submitted</h2>
            <p>Your t-shirt size has been recorded successfully.</p>
            <button onclick="resetForm()" class="btn-secondary">
                <i class="fa-sharp fa-thin fa-arrow-rotate-left"></i>
                Submit Another
            </button>
        </div>
    </div>

    <div id="errorToast" class="error-toast hidden">
        <i class="fa-sharp fa-thin fa-circle-xmark"></i>
        <span id="errorText"></span>
    </div>

    <script>
        const form = document.getElementById('tshirtForm');
        const submitBtn = document.getElementById('submitBtn');
        const successPanel = document.getElementById('successPanel');
        const errorToast = document.getElementById('errorToast');
        const errorText = document.getElementById('errorText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const formData = {
                name: document.getElementById('name').value.trim(),
                rollNumber: document.getElementById('rollNumber').value.trim(),
                house: document.getElementById('house').value,
                size: document.getElementById('size').value.trim()
            };

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-sharp fa-thin fa-spinner fa-spin"></i> Submitting...';

            try {
                const response = await fetch('submit.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (result.success) {
                    form.classList.add('hidden');
                    successPanel.classList.remove('hidden');
                } else {
                    showError(result.message || 'Something went wrong. Please try again.');
                }
            } catch (err) {
                showError('Network error. Please check your connection and try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-sharp fa-thin fa-paper-plane"></i> Submit';
            }
        });

        function showError(msg) {
            errorText.textContent = msg;
            errorToast.classList.remove('hidden');
            setTimeout(hideError, 5000);
        }

        function hideError() {
            errorToast.classList.add('hidden');
        }

        function resetForm() {
            form.reset();
            form.classList.remove('hidden');
            successPanel.classList.add('hidden');
            hideError();
        }
    </script>
</body>
</html>
