<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Shirt Size Collection</title>
    <script src="https://zenithkandel.com.np/fontawesome/zenith-icons.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="form-page">
    <div class="form-wrapper">
        <div class="form-split">
            <div class="form-visual">
                <div class="tshirt-flip-card" id="flipCard">
                    <div class="flip-inner">
                        <div class="flip-front">
                            <img src="images/tshirt-front.png" alt="T-Shirt Front">
                            <span class="flip-label">Front</span>
                        </div>
                        <div class="flip-back">
                            <img src="images/tshirt-back.png" alt="T-Shirt Back">
                            <span class="flip-label">Back</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-content">
                <div class="form-header">
                    <h1>T-Shirt Size</h1>
                    <p>Fill in your details below</p>
                </div>

                <form id="tshirtForm">
                    <div class="form-group">
                        <label for="name"><i class="fa-sharp fa-thin fa-user"></i> Name</label>
                        <input type="text" id="name" class="form-input" placeholder="Enter your name" required autocomplete="name">
                    </div>

                    <div class="form-group">
                        <label for="rollNumber"><i class="fa-sharp fa-thin fa-hashtag"></i> Roll Number</label>
                        <input type="text" id="rollNumber" class="form-input" placeholder="Enter your roll number" required>
                    </div>

                    <div class="form-group">
                        <label><i class="fa-sharp fa-thin fa-house"></i> House</label>
                        <div class="chip-group" id="houseGroup">
                            <label class="chip" data-value="Gaurishankar" style="--chip-color: #6b6b6b">
                                <input type="radio" name="house" value="Gaurishankar" required>
                                <span>Gaurishankar</span>
                            </label>
                            <label class="chip" data-value="Byashrishi" style="--chip-color: #8b5e3c">
                                <input type="radio" name="house" value="Byashrishi">
                                <span>Byashrishi</span>
                            </label>
                            <label class="chip" data-value="Ratnachuli" style="--chip-color: #2d5a3d">
                                <input type="radio" name="house" value="Ratnachuli">
                                <span>Ratnachuli</span>
                            </label>
                            <label class="chip" data-value="Choyu" style="--chip-color: #1a1a1a">
                                <input type="radio" name="house" value="Choyu">
                                <span>Choyu</span>
                            </label>
                        </div>
                    </div>

            <div class="form-group">
                <label><i class="fa-sharp fa-thin fa-ruler"></i> T-Shirt Size</label>
                <div class="chip-group" id="sizeGroup">
                    <label class="chip chip-size" style="--chip-color: var(--accent)">
                        <input type="radio" name="size" value="S" required>
                        <span>S</span>
                    </label>
                    <label class="chip chip-size" style="--chip-color: var(--accent)">
                        <input type="radio" name="size" value="M">
                        <span>M</span>
                    </label>
                    <label class="chip chip-size" style="--chip-color: var(--accent)">
                        <input type="radio" name="size" value="L">
                        <span>L</span>
                    </label>
                    <label class="chip chip-size" style="--chip-color: var(--accent)">
                        <input type="radio" name="size" value="XL">
                        <span>XL</span>
                    </label>
                    <label class="chip chip-size" style="--chip-color: var(--accent)">
                        <input type="radio" name="size" value="XXL">
                        <span>XXL</span>
                    </label>
                </div>
            </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="submitBtn">
                            <i class="fa-sharp fa-thin fa-paper-plane"></i>
                            Submit
                        </button>
                    </div>

                    <p class="form-note">
                        <i class="fa-sharp fa-thin fa-circle-info"></i>
                        Once submitted, this form cannot be undone.
                    </p>
                </form>

                <div id="successPanel" class="success-panel hidden">
                    <div class="success-icon">
                        <i class="fa-sharp fa-thin fa-check"></i>
                    </div>
                    <h2>Submitted</h2>
                    <p>Your t-shirt size has been recorded successfully.</p>
                    <button onclick="resetForm()" class="btn-secondary">
                        <i class="fa-sharp fa-thin fa-arrow-rotate-left"></i>
                        Submit Another
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="errorToast" class="error-toast hidden">
        <i class="fa-sharp fa-thin fa-circle-xmark"></i>
        <span id="errorText"></span>
    </div>

    <script>
        const form = document.getElementById('tshirtForm');
        const submitBtn = document.getElementById('submitBtn');
        const successPanel = document.getElementById('successPanel');
        const errorToast = document.getElementById('errorToast');
        const errorText = document.getElementById('errorText');
        const flipCard = document.getElementById('flipCard');

        // Chip selection
        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const group = chip.closest('.chip-group');
                group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                chip.querySelector('input').checked = true;
            });
        });

        // Flip on hover
        flipCard.addEventListener('mouseenter', () => {
            flipCard.classList.add('flipped');
        });

        flipCard.addEventListener('mouseleave', () => {
            flipCard.classList.remove('flipped');
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const formData = {
                name: document.getElementById('name').value.trim(),
                rollNumber: document.getElementById('rollNumber').value.trim(),
                house: document.querySelector('input[name="house"]:checked')?.value || '',
                size: document.querySelector('input[name="size"]:checked')?.value || ''
            };

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-sharp fa-thin fa-spinner fa-spin"></i> Submitting...';

            try {
                const response = await fetch('submit.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (result.success) {
                    form.classList.add('hidden');
                    successPanel.classList.remove('hidden');
                } else {
                    showError(result.message || 'Something went wrong. Please try again.');
                }
            } catch (err) {
                showError('Network error. Please check your connection and try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-sharp fa-thin fa-paper-plane"></i> Submit';
            }
        });

        function showError(msg) {
            errorText.textContent = msg;
            errorToast.classList.remove('hidden');
            setTimeout(hideError, 5000);
        }

        function hideError() {
            errorToast.classList.add('hidden');
        }

        function resetForm() {
            form.reset();
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            form.classList.remove('hidden');
            successPanel.classList.add('hidden');
            hideError();
        }
    </script>
</body>
</html>
