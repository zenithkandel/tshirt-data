<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — T-Shirt Collection</title>
    <script src="https://zenithkandel.com.np/fontawesome/zenith-icons.js"></script>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>

    <!-- PIN Screen -->
    <div id="pinScreen" class="pin-screen">
        <div class="pin-card">
            <div class="pin-icon">
                <i class="fa-sharp fa-thin fa-lock"></i>
            </div>
            <h2>Admin Access</h2>
            <p>Enter your PIN to continue</p>
            <form id="pinForm" class="pin-form">
                <input type="password" id="pinInput" maxlength="4" placeholder="_ _ _ _" inputmode="numeric" pattern="[0-9]*" autocomplete="off" required>
                <button type="submit" class="btn-primary">
                    <i class="fa-sharp fa-thin fa-arrow-right-to-bracket"></i>
                    Enter
                </button>
            </form>
            <p id="pinError" class="pin-error hidden">Invalid PIN. Try again.</p>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminDashboard" class="admin-dashboard hidden">
        <header class="admin-header">
            <div class="header-left">
                <div class="logo-mark">
                    <i class="fa-sharp fa-thin fa-shirt"></i>
                </div>
                <h1>Admin Panel</h1>
            </div>
            <div class="header-right">
                <button onclick="refreshData()" class="header-btn" title="Refresh data">
                    <i class="fa-sharp fa-thin fa-arrows-rotate"></i>
                </button>
                <button onclick="exportCSV()" class="header-btn" title="Export as CSV">
                    <i class="fa-sharp fa-thin fa-download"></i>
                </button>
                <div class="header-divider"></div>
                <button onclick="logout()" class="header-btn logout" title="Logout">
                    <i class="fa-sharp fa-thin fa-right-from-bracket"></i>
                </button>
            </div>
        </header>

        <div class="dashboard-content">

            <!-- Stats -->
            <div class="section-header">
                <h3>Overview</h3>
            </div>
            <div class="stats-row">
                <div class="stat-cell">
                    <div class="stat-icon"><i class="fa-sharp fa-thin fa-users"></i></div>
                    <div class="stat-content">
                        <span class="stat-value" id="totalSubmissions">0</span>
                        <span class="stat-label">Total Submissions</span>
                    </div>
                </div>
                <div class="stat-cell">
                    <div class="stat-icon"><i class="fa-sharp fa-thin fa-shirt"></i></div>
                    <div class="stat-content">
                        <span class="stat-value" id="distributedCount">0</span>
                        <span class="stat-label">Distributed</span>
                    </div>
                </div>
                <div class="stat-cell">
                    <div class="stat-icon"><i class="fa-sharp fa-thin fa-house"></i></div>
                    <div class="stat-content">
                        <span class="stat-value" id="totalHouses">0</span>
                        <span class="stat-label">Houses</span>
                    </div>
                </div>
                <div class="stat-cell">
                    <div class="stat-icon"><i class="fa-sharp fa-thin fa-ruler"></i></div>
                    <div class="stat-content">
                        <span class="stat-value" id="totalSizes">0</span>
                        <span class="stat-label">Unique Sizes</span>
                    </div>
                </div>
            </div>

            <!-- Analytics -->
            <div class="section-header">
                <h3>Analytics</h3>
            </div>
            <div class="analytics-grid">
                <div class="analytics-panel">
                    <div class="panel-title">
                        <i class="fa-sharp fa-thin fa-house"></i>
                        <span>By House</span>
                    </div>
                    <div id="houseAnalytics"></div>
                </div>
                <div class="analytics-panel">
                    <div class="panel-title">
                        <i class="fa-sharp fa-thin fa-ruler"></i>
                        <span>By Size</span>
                    </div>
                    <div id="sizeAnalytics"></div>
                </div>
            </div>

            <!-- Table -->
            <div class="section-header">
                <h3>Submissions</h3>
            </div>
            <div class="table-section">
                <div class="table-toolbar">
                    <div class="toolbar-title">
                        <i class="fa-sharp fa-thin fa-list"></i>
                        <span>All Entries</span>
                    </div>
                    <div class="toolbar-actions">
                        <div class="search-input">
                            <i class="fa-sharp fa-thin fa-magnifying-glass"></i>
                            <input type="text" id="searchInput" placeholder="Search name or roll...">
                        </div>
                        <select id="houseFilter" class="filter-select" onchange="renderTable()">
                            <option value="">All Houses</option>
                            <option value="Gaurishankar">Gaurishankar</option>
                            <option value="Byashrishi">Byashrishi</option>
                            <option value="Ratnachuli">Ratnachuli</option>
                            <option value="Choyu">Choyu</option>
                        </select>
                        <div class="sort-group">
                            <button onclick="sortData('rollNumber')" class="sort-btn" id="sortRoll">
                                <i class="fa-sharp fa-thin fa-arrow-down-1-9"></i>
                                Roll No.
                            </button>
                            <button onclick="sortData('submittedAt')" class="sort-btn active" id="sortTime">
                                <i class="fa-sharp fa-thin fa-clock"></i>
                                Time
                            </button>
                        </div>
                    </div>
                </div>
                <div class="table-wrap">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Roll No.</th>
                                <th>House</th>
                                <th>Size</th>
                                <th>Status</th>
                                <th>Submitted</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                    <div id="emptyState" class="empty-state hidden">
                        <div class="empty-icon">
                            <i class="fa-sharp fa-thin fa-inbox"></i>
                        </div>
                        <p>No submissions yet</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal-overlay hidden" onclick="if(event.target===this)closeEditModal()">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Edit Entry</h3>
                <button onclick="closeEditModal()" class="modal-close">
                    <i class="fa-sharp fa-thin fa-xmark"></i>
                </button>
            </div>
            <form id="editForm" onsubmit="saveEdit(event)">
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="form-group-modal">
                        <label for="editName">Name</label>
                        <input type="text" id="editName" class="form-input" required>
                    </div>
                    <div class="form-group-modal">
                        <label for="editRollNumber">Roll Number</label>
                        <input type="text" id="editRollNumber" class="form-input" required>
                    </div>
                    <div class="form-group-modal">
                        <label for="editHouse">House</label>
                        <select id="editHouse" class="form-select" required>
                            <option value="Gaurishankar">Gaurishankar</option>
                            <option value="Byashrishi">Byashrishi</option>
                            <option value="Ratnachuli">Ratnachuli</option>
                            <option value="Choyu">Choyu</option>
                        </select>
                    </div>
                    <div class="form-group-modal">
                        <label for="editSize">Size</label>
                        <select id="editSize" class="form-select" required>
                            <option value="S">S</option>
                            <option value="M">M</option>
                            <option value="L">L</option>
                            <option value="XL">XL</option>
                            <option value="XXL">XXL</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" onclick="closeEditModal()" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">
                        <i class="fa-sharp fa-thin fa-check"></i>
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const PIN = '8023';
        let allData = [];
        let analytics = {};
        let currentSort = sessionStorage.getItem('adminSort') || 'submittedAt';
        let sortDirection = sessionStorage.getItem('adminSortDir') || 'desc';
        let currentHouseFilter = '';

        // Restore sort button state
        function restoreSortUI() {
            document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(currentSort === 'rollNumber' ? 'sortRoll' : 'sortTime').classList.add('active');
        }

        // Check if already logged in
        if (sessionStorage.getItem('adminAuth') === 'true') {
            document.getElementById('pinScreen').classList.add('hidden');
            document.getElementById('adminDashboard').classList.remove('hidden');
            restoreSortUI();
            loadData();
        }

        document.getElementById('pinForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('pinInput').value;
            if (input === PIN) {
                sessionStorage.setItem('adminAuth', 'true');
                document.getElementById('pinScreen').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
                restoreSortUI();
                loadData();
            } else {
                document.getElementById('pinError').classList.remove('hidden');
                document.getElementById('pinInput').value = '';
                document.getElementById('pinInput').focus();
            }
        });

        document.getElementById('pinInput').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });

        async function loadData() {
            try {
                const response = await fetch(`../get-data.php?pin=${PIN}`);
                const result = await response.json();
                if (result.success) {
                    allData = result.data;
                    analytics = result.analytics;
                    renderDashboard();
                }
            } catch (err) {
                console.error('Failed to load data:', err);
            }
        }

        function renderDashboard() {
            document.getElementById('totalSubmissions').textContent = analytics.total || 0;
            document.getElementById('distributedCount').textContent = analytics.distributed || 0;
            document.getElementById('totalHouses').textContent = Object.keys(analytics.byHouse || {}).length;
            document.getElementById('totalSizes').textContent = Object.keys(analytics.bySize || {}).length;

            renderBars('houseAnalytics', analytics.byHouse || {});
            renderBars('sizeAnalytics', analytics.bySize || {});
            renderTable();
        }

        function renderBars(containerId, data) {
            const container = document.getElementById(containerId);
            const max = Math.max(...Object.values(data), 1);
            container.innerHTML = Object.entries(data).map(([key, count]) => `
                <div class="bar-item">
                    <span class="bar-name">${escapeHtml(key)}</span>
                    <div class="bar-track">
                        <div class="bar-fill" style="width: ${(count / max) * 100}%"></div>
                    </div>
                    <span class="bar-count">${count}</span>
                </div>
            `).join('');
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            currentHouseFilter = document.getElementById('houseFilter').value;

            let filtered = allData.filter(entry => {
                const matchesSearch = entry.name.toLowerCase().includes(searchTerm) ||
                    entry.rollNumber.toLowerCase().includes(searchTerm);
                const matchesHouse = !currentHouseFilter || entry.house === currentHouseFilter;
                return matchesSearch && matchesHouse;
            });

            filtered.sort((a, b) => {
                let valA, valB;
                if (currentSort === 'rollNumber') {
                    valA = a.rollNumber.toLowerCase();
                    valB = b.rollNumber.toLowerCase();
                    return sortDirection === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
                } else {
                    valA = new Date(a.submittedAt).getTime();
                    valB = new Date(b.submittedAt).getTime();
                    return sortDirection === 'asc' ? valA - valB : valB - valA;
                }
            });

            if (filtered.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            tbody.innerHTML = filtered.map((entry, index) => `
                <tr class="${entry.distributed ? 'row-distributed' : ''}">
                    <td class="mono">${index + 1}</td>
                    <td>${escapeHtml(entry.name)}</td>
                    <td class="mono">${escapeHtml(entry.rollNumber)}</td>
                    <td><span class="badge badge-house">${entry.house}</span></td>
                    <td><span class="badge badge-size">${escapeHtml(entry.size)}</span></td>
                    <td>
                        <label class="dist-check" title="${entry.distributed ? 'Distributed' : 'Pending'}">
                            <input type="checkbox" ${entry.distributed ? 'checked' : ''} onchange="toggleDistribute('${entry.id}')">
                            <span class="dist-checkmark"></span>
                            <span class="dist-label">${entry.distributed ? 'Distributed' : 'Pending'}</span>
                        </label>
                    </td>
                    <td class="mono">${formatDate(entry.submittedAt)}</td>
                    <td>
                        <div class="action-btns">
                            <button onclick="openEditModal('${entry.id}')" class="btn-edit" title="Edit entry">
                                <i class="fa-sharp fa-thin fa-pen"></i>
                            </button>
                            <button onclick="deleteEntry('${entry.id}')" class="btn-delete" title="Delete entry">
                                <i class="fa-sharp fa-thin fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function sortData(field) {
            if (currentSort === field) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort = field;
                sortDirection = field === 'submittedAt' ? 'desc' : 'asc';
            }

            sessionStorage.setItem('adminSort', currentSort);
            sessionStorage.setItem('adminSortDir', sortDirection);

            document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(field === 'rollNumber' ? 'sortRoll' : 'sortTime').classList.add('active');
            renderTable();
        }

        async function deleteEntry(id) {
            if (!confirm('Are you sure you want to delete this entry?')) return;

            try {
                const response = await fetch('../delete.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin: PIN, id: id })
                });
                const result = await response.json();
                if (result.success) {
                    loadData();
                } else {
                    alert(result.message);
                }
            } catch (err) {
                alert('Failed to delete entry');
            }
        }

        function exportCSV() {
            if (allData.length === 0) {
                alert('No data to export');
                return;
            }

            const headers = ['Name', 'Roll Number', 'House', 'Size', 'Distributed', 'Submitted At'];
            const rows = allData.map(e => [
                `"${e.name}"`,
                `"${e.rollNumber}"`,
                `"${e.house}"`,
                `"${e.size}"`,
                `"${e.distributed ? 'Yes' : 'No'}"`,
                `"${formatDate(e.submittedAt)}"`
            ]);

            const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `tshirt-submissions-${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function refreshData() {
            const btn = document.querySelector('.header-btn:first-child i');
            btn.classList.add('fa-spin');
            loadData().then(() => {
                setTimeout(() => btn.classList.remove('fa-spin'), 500);
            });
        }

        function logout() {
            sessionStorage.removeItem('adminAuth');
            sessionStorage.removeItem('adminSort');
            sessionStorage.removeItem('adminSortDir');
            document.getElementById('adminDashboard').classList.add('hidden');
            document.getElementById('pinScreen').classList.remove('hidden');
            document.getElementById('pinInput').value = '';
            document.getElementById('pinError').classList.add('hidden');
        }

        document.getElementById('searchInput').addEventListener('input', renderTable);

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleDateString('en-US', {
                month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
            });
        }

        function openEditModal(id) {
            const entry = allData.find(e => e.id === id);
            if (!entry) return;

            document.getElementById('editId').value = entry.id;
            document.getElementById('editName').value = entry.name;
            document.getElementById('editRollNumber').value = entry.rollNumber;
            document.getElementById('editHouse').value = entry.house;
            document.getElementById('editSize').value = entry.size;
            document.getElementById('editModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        async function saveEdit(e) {
            e.preventDefault();

            const id = document.getElementById('editId').value;
            const name = document.getElementById('editName').value.trim();
            const rollNumber = document.getElementById('editRollNumber').value.trim();
            const house = document.getElementById('editHouse').value;
            const size = document.getElementById('editSize').value;

            if (!name || !rollNumber || !house || !size) {
                alert('All fields are required');
                return;
            }

            try {
                const response = await fetch('../edit.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin: PIN, id, name, rollNumber, house, size })
                });
                const result = await response.json();
                if (result.success) {
                    closeEditModal();
                    loadData();
                } else {
                    alert(result.message);
                }
            } catch (err) {
                alert('Failed to update entry');
            }
        }

        async function toggleDistribute(id) {
            try {
                const response = await fetch('../toggle-distribute.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin: PIN, id: id })
                });
                const result = await response.json();
                if (result.success) {
                    loadData();
                } else {
                    alert(result.message);
                }
            } catch (err) {
                alert('Failed to update distribution status');
            }
        }
    </script>
</body>
</html>
